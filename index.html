<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sun & The Moon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@200;400&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #020205; /* Deep space black */
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Starry Background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: transparent;
        }

        /* Generating random CSS stars */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px rgba(255,255,255,0.8); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        /* Main Content Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* The Eclipse CSS */
        .eclipse-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 40px;
        }

        .sun {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffe3a1;
            border-radius: 50%;
            box-shadow: 0 0 40px #ffb347, 0 0 100px #ff8c00, 0 0 150px rgba(255, 140, 0, 0.5);
        }

        .moon {
            position: absolute;
            top: 0;
            left: 6px; /* Offset to create the glowing ring effect */
            width: 100%;
            height: 100%;
            background: #020205; /* Matches background */
            border-radius: 50%;
            box-shadow: inset -15px 0 30px rgba(255, 255, 255, 0.05);
            animation: moonDrift 4s ease-in-out infinite alternate;
        }

        @keyframes moonDrift {
            0% { left: 4px; }
            100% { left: 8px; }
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }

        /* Glassmorphism Timer Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
        }

        .time-box span {
            font-size: 3.5rem;
            font-weight: 200;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .time-box p {
            margin: 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a9a9b3;
        }

        #message {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: #ffe3a1;
            display: none;
            text-shadow: 0 0 30px rgba(255, 227, 161, 0.6);
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; }
            .glass-card { padding: 20px; gap: 15px; }
            .time-box span { font-size: 2.5rem; }
            .eclipse-container { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

    <div class="stars" id="star-container"></div>

    <div class="container">
        <div class="eclipse-container" id="eclipse">
            <div class="sun"></div>
            <div class="moon"></div>
        </div>

        <h1 id="title">When the Sun and Moon Finally Meet</h1>
        
        <div class="glass-card" id="timer">
            <div class="time-box"><span id="days">00</span><p>Days</p></div>
            <div class="time-box"><span id="hours">00</span><p>Hours</p></div>
            <div class="time-box"><span id="minutes">00</span><p>Minutes</p></div>
            <div class="time-box"><span id="seconds">00</span><p>Seconds</p></div>
        </div>
        
        <h2 id="message">Together at last.</h2>
    </div>

    <script>
        // --- 1. GENERATE BACKGROUND STARS ---
        const starContainer = document.getElementById('star-container');
        const starCount = 100;
        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            
            // Randomize position, size, and animation delay
            let xy = [Math.random() * 100, Math.random() * 100];
            let size = Math.random() * 3 + 1;
            let duration = Math.random() * 4 + 2;
            let delay = Math.random() * 5;

            star.style.left = xy[0] + 'vw';
            star.style.top = xy[1] + 'vh';
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.animationDuration = duration + 's';
            star.style.animationDelay = delay + 's';

            starContainer.appendChild(star);
        }

        // --- 2. COUNTDOWN LOGIC ---
        // Set for June 29, 2026
        const targetDate = new Date("Jun 29, 2026 00:00:00").getTime();

        const countdown = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Add leading zero if number is less than 10
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;

            // When the countdown ends
            if (distance < 0) {
                clearInterval(countdown);
                document.getElementById("timer").style.display = "none";
                document.getElementById("title").style.display = "none";
                document.getElementById("eclipse").style.display = "none";
                document.getElementById("message").style.display = "block";
            }
        }, 1000);
    </script>
</body>
</html>
